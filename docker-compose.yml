services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ai_kanban
      POSTGRES_USER:     kanban
      POSTGRES_PASSWORD: kanban
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d ai_kanban"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend orchestrator ────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:         "3001"
      DATABASE_URL: postgres://kanban:kanban@postgres:5432/ai_kanban
    env_file:
      - .env
    volumes:
      # Claude Code auth credentials (run `claude login` on the host first)
      - ${HOME}/.claude:/root/.claude:ro
      # Cloned target repository — persists across restarts
      - repo_data:/repo

  # ─── Frontend (React → nginx) ─────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
  repo_data:
