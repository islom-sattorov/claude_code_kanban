services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_kanban
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d ai_kanban"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend orchestrator ────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://kanban:kanban@postgres:5432/ai_kanban
      AGENT_CONCURRENCY: "1"
      CLAUDE_MAX_TURNS: "10"
      CLAUDE_TIMEOUT_MS: "120000"
    volumes:
      # Claude Code needs both the directory AND the .claude.json file, writable
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
      # Multi-project repos — each project cloned under ./repos/{projectId} on the host
      - ./repos:/repos

  # ─── Frontend (React → nginx) ─────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
  repo_data:
