services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ai_kanban
      POSTGRES_USER:     kanban
      POSTGRES_PASSWORD: kanban
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d ai_kanban"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend orchestrator ────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:              "3001"
      DATABASE_URL:      postgres://kanban:kanban@postgres:5432/ai_kanban
      # GitHub config is managed through the UI and persisted in the database.
      # Uncomment these only if you want bootstrap defaults on the very first run:
      # GITHUB_PAT:        ""
      # GITHUB_REPO_OWNER: ""
      # GITHUB_REPO_NAME:  ""
      # GITHUB_BASE_BRANCH: main
      AGENT_CONCURRENCY: "1"
      CLAUDE_MAX_TURNS:  "10"
      CLAUDE_TIMEOUT_MS: "120000"
    volumes:
      # Claude Code needs both the directory AND the .claude.json file, writable
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
      # Legacy single repo — persists across restarts
      - repo_data:/repo
      # Multi-project repos — each project cloned under ./repos/{projectId} on the host
      - ./repos:/repos

  # ─── Frontend (React → nginx) ─────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
  repo_data:
